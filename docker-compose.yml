services:
  georeasoner:
    build: .
    ports:
      - "8000:8000"
    environment:
      # LM Studio must be running on the host machine at port 1234
      LM_STUDIO_BASE_URL: "http://host.docker.internal:1234/v1"
      LM_STUDIO_MODEL: "gemma-3-12b"
      LM_STUDIO_API_KEY: "lm-studio"
      DUCKDB_PATH: "/app/data/georeasoner.duckdb"
      LOG_LEVEL: "INFO"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    extra_hosts:
      # Allows container to reach host network (LM Studio) on Linux
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
