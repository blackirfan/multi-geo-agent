<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoReasoner — Flood Vulnerability Intelligence</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --navy: #0f3460; --red: #e94560; --teal: #16213e;
      --light: #f0f4f8; --mid: #8892a4; --border: #dce3ec;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; background: var(--light); color: var(--teal); }

    /* ── Header ── */
    header {
      background: var(--navy);
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header h1 span { color: var(--red); }
    header p { font-size: 12px; color: var(--mid); margin-top: 2px; }
    .badge { background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 12px; margin-left: 8px; vertical-align: middle; }

    /* ── Main layout ── */
    main { display: flex; flex: 1; overflow: hidden; }

    /* ── Left panel ── */
    .sidebar {
      width: 360px;
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .query-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--light);
    }
    .query-section label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--mid); }
    .query-section textarea {
      width: 100%; margin-top: 6px; padding: 8px 10px;
      border: 1px solid var(--border); border-radius: 5px;
      font-family: inherit; font-size: 13px; resize: vertical; min-height: 64px;
    }
    .query-section textarea:focus { outline: none; border-color: var(--red); }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn {
      flex: 1; padding: 8px; border: none; border-radius: 5px;
      font-weight: 600; font-size: 13px; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-secondary { background: var(--navy); color: #fff; font-size: 12px; }

    /* ── Ranking panel ── */
    .ranking-panel { flex: 1; overflow-y: auto; padding: 0; }
    .ranking-header {
      position: sticky; top: 0; background: var(--navy); color: #fff;
      padding: 9px 16px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      display: flex; justify-content: space-between; align-items: center;
    }
    .ranking-header .count { font-weight: 400; color: var(--mid); }
    .rank-item {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      transition: background .12s;
    }
    .rank-item:hover { background: var(--light); }
    .rank-num {
      min-width: 26px; height: 26px; line-height: 26px;
      text-align: center; border-radius: 50%;
      font-weight: 700; font-size: 11px;
      background: var(--navy); color: #fff; flex-shrink: 0;
    }
    .rank-num.top3 { background: var(--red); }
    .rank-info { flex: 1; }
    .rank-name { font-weight: 600; font-size: 13px; }
    .rank-fsi { font-size: 11px; color: var(--mid); margin-top: 2px; }
    .fsi-bar-bg { background: var(--border); border-radius: 3px; height: 6px; margin-top: 5px; }
    .fsi-bar-fill { height: 100%; border-radius: 3px; background: var(--red); }

    /* ── Map ── */
    #map { flex: 1; }

    /* ── Status / spinner ── */
    #status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(15,52,96,.92); color: #fff;
      font-size: 12px; padding: 7px 20px;
      display: none; align-items: center; gap: 10px; z-index: 9999;
    }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: var(--red); border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Popup ── */
    .leaflet-popup-content b { color: var(--navy); }
    .leaflet-popup-content .fsi-pill {
      display: inline-block; padding: 1px 8px; border-radius: 12px;
      font-size: 11px; font-weight: 700; color: #fff; margin-left: 6px;
    }

    /* ── Download row ── */
    .dl-row { padding: 10px 16px; border-top: 1px solid var(--border); background: var(--light); }
    .dl-row a {
      display: block; text-align: center; padding: 7px;
      background: var(--navy); color: #fff; border-radius: 5px;
      font-size: 12px; font-weight: 600; text-decoration: none;
      transition: opacity .15s;
    }
    .dl-row a:hover { opacity: .85; }
  </style>
</head>
<body>

<header>
  <div>
    <h1><span>Geo</span>Reasoner <span class="badge">β</span></h1>
    <p>LLM-Orchestrated Multi-Agent Geospatial Reasoning · Flood Vulnerability · Sylhet, Bangladesh</p>
  </div>
</header>

<main>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="query-section">
      <label>Natural-Language Query</label>
      <textarea id="query-input" placeholder="Which upazilas in Sylhet have the highest flood risk?">Which unions in Sylhet have the highest flood risk?</textarea>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="runAnalysis()">&#9654; Run Analysis</button>
        <button class="btn btn-secondary" onclick="downloadReport()">&#8595; PDF</button>
      </div>
    </div>

    <div class="ranking-panel">
      <div class="ranking-header">
        FSI Ranking
        <span class="count" id="rank-count">—</span>
      </div>
      <div id="rank-list">
        <div style="padding:24px 16px; color:var(--mid); font-size:12px; text-align:center;">
          Run an analysis to see the ranking.
        </div>
      </div>
    </div>

    <div class="dl-row" id="dl-row" style="display:none;">
      <a id="dl-link" href="#" target="_blank">Download Full PDF Report</a>
    </div>
  </aside>

  <!-- Map -->
  <div id="map"></div>
</main>

<div id="status-bar">
  <div class="spinner"></div>
  <span id="status-text">Running analysis…</span>
</div>

<script>
// ── Leaflet init ──────────────────────────────────────────────────────────────
const map = L.map('map').setView([24.9, 91.87], 9);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

let adminLayer = null;
let riverLayer = null;
let currentRunId = null;

// FSI colour scale
function fsiColor(v) {
  v = Math.max(0, Math.min(1, v));
  if (v < 0.25) return interpolate('#2ecc71', '#f1c40f', v / 0.25);
  if (v < 0.50) return interpolate('#f1c40f', '#e67e22', (v - 0.25) / 0.25);
  if (v < 0.75) return interpolate('#e67e22', '#e74c3c', (v - 0.50) / 0.25);
  return interpolate('#e74c3c', '#8e44ad', (v - 0.75) / 0.25);
}

function interpolate(c1, c2, t) {
  const h = s => [parseInt(s.slice(1,3),16), parseInt(s.slice(3,5),16), parseInt(s.slice(5,7),16)];
  const [r1,g1,b1] = h(c1), [r2,g2,b2] = h(c2);
  const r = Math.round(r1 + t*(r2-r1));
  const g = Math.round(g1 + t*(g2-g1));
  const b = Math.round(b1 + t*(b2-b1));
  return `rgb(${r},${g},${b})`;
}

// ── Load base layers ──────────────────────────────────────────────────────────
async function loadBaseLayers() {
  try {
    const [adminRes, riverRes] = await Promise.all([
      fetch('/layers/admin'),
      fetch('/layers/rivers'),
    ]);
    const adminGeo = await adminRes.json();
    const riverGeo = await riverRes.json();

    riverLayer = L.geoJSON(riverGeo, {
      style: { color: '#1a6ca8', weight: 1.5, opacity: .7 }
    }).addTo(map);

    adminLayer = L.geoJSON(adminGeo, {
      style: { color: '#fff', weight: 1, fillColor: '#8892a4', fillOpacity: .25 },
      onEachFeature: (f, l) => {
        const n = f.properties.upazila_name || f.properties.NAME_3 || f.properties.NAME_2 || f.properties.name || '?';
        l.bindTooltip(`<b>${n}</b>`, { sticky: true });
      }
    }).addTo(map);

    if (adminGeo.features && adminGeo.features.length) {
      map.fitBounds(adminLayer.getBounds(), { padding: [20, 20] });
    }
  } catch(e) {
    console.warn('Base layer load failed:', e);
  }
}

// ── Run analysis ──────────────────────────────────────────────────────────────
async function runAnalysis() {
  const query = document.getElementById('query-input').value.trim();
  if (!query) return;

  setStatus('Running multi-agent analysis pipeline…');
  document.getElementById('rank-list').innerHTML =
    '<div style="padding:24px 16px;color:var(--mid);font-size:12px;text-align:center;">Analysing…</div>';
  document.getElementById('rank-count').textContent = '—';
  document.getElementById('dl-row').style.display = 'none';

  try {
    const res = await fetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || res.statusText);
    }

    const data = await res.json();
    currentRunId = data.run_id;

    // Fetch FSI layer and update map
    const fsiRes = await fetch(`/layers/fsi?run_id=${currentRunId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fsi_ranking: data.fsi_ranking })
    });
    const fsiGeo = await fsiRes.json();

    if (adminLayer) map.removeLayer(adminLayer);
    adminLayer = L.geoJSON(fsiGeo, {
      style: f => {
        const fsi = f.properties.mean_fsi;
        return {
          fillColor: fsi != null ? fsiColor(fsi) : '#8892a4',
          color: '#fff', weight: 1,
          fillOpacity: fsi != null ? 0.70 : 0.20
        };
      },
      onEachFeature: (f, l) => {
        const p = f.properties;
        const n = p.upazila_name || p.NAME_3 || p.NAME_2 || p.name || '?';
        const fsi = p.mean_fsi;
        const pill = fsi != null
          ? `<span class="fsi-pill" style="background:${fsiColor(fsi)}">${fsi.toFixed(4)}</span>`
          : '';
        l.bindPopup(`<b>${n}</b>${pill}<br>Rank: ${p.fsi_rank ?? '?'}<br>Mean FSI: ${fsi != null ? fsi.toFixed(4) : 'n/a'}`);
        l.on('mouseover', () => l.setStyle({ weight: 2, color: '#333' }));
        l.on('mouseout', () => adminLayer.resetStyle(l));
      }
    }).addTo(map);

    renderRanking(data.fsi_ranking);
    hideStatus();

  } catch(e) {
    hideStatus();
    alert('Analysis failed: ' + e.message);
    console.error(e);
  }
}

// ── Render ranking sidebar ────────────────────────────────────────────────────
function renderRanking(ranking) {
  const list = document.getElementById('rank-list');
  document.getElementById('rank-count').textContent = ranking.length + ' units';

  if (!ranking.length) {
    list.innerHTML = '<div style="padding:16px;color:var(--mid);font-size:12px;">No ranking data.</div>';
    return;
  }

  list.innerHTML = ranking.map((r, i) => `
    <div class="rank-item" onclick="highlightUnit('${r.name}')">
      <div class="rank-num ${i < 3 ? 'top3' : ''}">${r.rank}</div>
      <div class="rank-info">
        <div class="rank-name">${r.name}</div>
        <div class="rank-fsi">Mean FSI: ${r.mean_fsi.toFixed(4)} · Max: ${r.max_fsi.toFixed(4)}</div>
        <div class="fsi-bar-bg">
          <div class="fsi-bar-fill" style="width:${Math.round(r.mean_fsi*100)}%;background:${fsiColor(r.mean_fsi)}"></div>
        </div>
      </div>
    </div>
  `).join('');

  // Show download link
  if (currentRunId) {
    document.getElementById('dl-link').href = `/reports/${currentRunId}`;
    document.getElementById('dl-row').style.display = 'block';
  }
}

// ── Download report ───────────────────────────────────────────────────────────
async function downloadReport() {
  if (!currentRunId) { alert('Run an analysis first.'); return; }
  setStatus('Generating PDF report…');
  try {
    const res = await fetch(`/reports/${currentRunId}`);
    if (res.ok) {
      window.open(`/reports/${currentRunId}`, '_blank');
    } else {
      alert('Report not ready — run the analysis first.');
    }
  } finally {
    hideStatus();
  }
}

function highlightUnit(name) {
  if (!adminLayer) return;
  adminLayer.eachLayer(l => {
    const p = l.feature?.properties || {};
    const n = p.upazila_name || p.NAME_3 || p.NAME_2 || p.name;
    if (n === name) {
      map.fitBounds(l.getBounds(), { maxZoom: 11 });
      l.openPopup();
    }
  });
}

function setStatus(msg) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-bar').style.display = 'flex';
}
function hideStatus() {
  document.getElementById('status-bar').style.display = 'none';
}

// ── Bootstrap ────────────────────────────────────────────────────────────────
loadBaseLayers();
</script>
</body>
</html>
